name: Deploy Frontend to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://13.206.81.60

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          printf '%s' "$SSH_KEY" > /tmp/ec2_key.pem
          chmod 400 /tmp/ec2_key.pem
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem \
            ubuntu@13.206.81.60 "mkdir -p /tmp/finpulse-deploy"
          scp -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem -r dist/* \
            ubuntu@13.206.81.60:/tmp/finpulse-deploy/
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem \
            ubuntu@13.206.81.60 \
            "sudo cp -r /tmp/finpulse-deploy/* /var/www/finpulse/ && sudo chown -R www-data:www-data /var/www/finpulse && echo 'Frontend deployed'"
          rm -f /tmp/ec2_key.pem
